<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">FEDformer forecasting pipeline architecture</title>
  <desc id="desc">Pipeline diagram showing data ingestion, training, model inference, forecast output, and downstream risk simulation.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#E2E8F0"/>
    </linearGradient>
    <linearGradient id="cardA" x1="0" y1="0" x2="260" y2="90" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A"/>
      <stop offset="1" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="cardB" x1="0" y1="0" x2="260" y2="90" gradientUnits="userSpaceOnUse">
      <stop stop-color="#14532D"/>
      <stop offset="1" stop-color="#166534"/>
    </linearGradient>
    <linearGradient id="cardC" x1="0" y1="0" x2="300" y2="120" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0C4A6E"/>
      <stop offset="1" stop-color="#0369A1"/>
    </linearGradient>
    <linearGradient id="cardD" x1="0" y1="0" x2="260" y2="90" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7C2D12"/>
      <stop offset="1" stop-color="#C2410C"/>
    </linearGradient>
    <filter id="shadow" x="-20" y="-20" width="1240" height="460" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0F172A" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10V0Z" fill="#475569"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1200" height="420" rx="28" fill="url(#bg)"/>

  <g filter="url(#shadow)">
    <rect x="48" y="130" width="220" height="96" rx="20" fill="url(#cardA)"/>
    <text x="74" y="170" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">CSV Data</text>
    <text x="74" y="202" fill="#CBD5E1" font-family="Segoe UI, Arial, sans-serif" font-size="18">Market features, targets,</text>
    <text x="74" y="226" fill="#CBD5E1" font-family="Segoe UI, Arial, sans-serif" font-size="18">optional timestamps</text>

    <rect x="330" y="78" width="260" height="88" rx="20" fill="url(#cardB)"/>
    <text x="356" y="116" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">TimeSeriesDataset</text>
    <text x="356" y="145" fill="#DCFCE7" font-family="Segoe UI, Arial, sans-serif" font-size="17">Window generation</text>

    <rect x="330" y="196" width="260" height="88" rx="20" fill="url(#cardB)"/>
    <text x="356" y="234" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">PreprocessingPipeline</text>
    <text x="356" y="263" fill="#DCFCE7" font-family="Segoe UI, Arial, sans-serif" font-size="17">Scaling, regimes, artifact restore</text>

    <rect x="650" y="90" width="300" height="180" rx="22" fill="url(#cardC)"/>
    <text x="676" y="128" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">WalkForwardTrainer</text>
    <text x="676" y="162" fill="#E0F2FE" font-family="Segoe UI, Arial, sans-serif" font-size="18">Temporal splits</text>
    <text x="676" y="188" fill="#E0F2FE" font-family="Segoe UI, Arial, sans-serif" font-size="18">Anti-leakage evaluation</text>
    <text x="676" y="214" fill="#E0F2FE" font-family="Segoe UI, Arial, sans-serif" font-size="18">Checkpointing and metrics</text>
    <rect x="676" y="228" width="248" height="28" rx="14" fill="rgba(255,255,255,0.14)"/>
    <text x="695" y="248" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="600">Flow_FEDformer = FEDformer + Flows</text>

    <rect x="1000" y="78" width="152" height="88" rx="20" fill="url(#cardD)"/>
    <text x="1022" y="116" fill="#FFF7ED" font-family="Segoe UI, Arial, sans-serif" font-size="23" font-weight="700">Forecast</text>
    <text x="1022" y="145" fill="#FFEDD5" font-family="Segoe UI, Arial, sans-serif" font-size="17">Preds, quantiles,</text>
    <text x="1022" y="168" fill="#FFEDD5" font-family="Segoe UI, Arial, sans-serif" font-size="17">samples, fold ids</text>

    <rect x="1000" y="206" width="152" height="88" rx="20" fill="url(#cardD)"/>
    <text x="1022" y="244" fill="#FFF7ED" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">Risk Sim</text>
    <text x="1022" y="273" fill="#FFEDD5" font-family="Segoe UI, Arial, sans-serif" font-size="17">Sharpe, Sortino,</text>
    <text x="1022" y="296" fill="#FFEDD5" font-family="Segoe UI, Arial, sans-serif" font-size="17">VaR, CVaR, MaxDD</text>
  </g>

  <path d="M268 178H316" stroke="#475569" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M460 166V184" stroke="#475569" stroke-width="5" stroke-linecap="round"/>
  <path d="M590 122H630" stroke="#475569" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M590 240H630" stroke="#475569" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M950 166H980" stroke="#475569" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M950 240H980" stroke="#475569" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>

  <text x="64" y="54" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">Pipeline Overview</text>
  <text x="64" y="84" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="18">From raw time-series data to probabilistic forecasts and downstream risk evaluation</text>
</svg>
