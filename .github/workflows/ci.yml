name: CI

on:
  push:
    branches: [main, master, develop, feature/optuna]
  pull_request:
    branches: [main, master, develop, feature/optuna]
  workflow_dispatch:

jobs:
  test:
    name: Unit Tests (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: "**/requirements.txt"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create synthetic CI datasets
        run: |
          python - <<'PY'
          from pathlib import Path

          import numpy as np
          import pandas as pd

          data_dir = Path("data")
          data_dir.mkdir(exist_ok=True)
          specs = {"NVDA": 320, "MSFT": 320}

          for idx, (ticker, rows) in enumerate(specs.items()):
              rng = np.random.default_rng(42 + idx)
              close = 100.0 + np.cumsum(rng.normal(0.1, 1.0, rows))
              volume = rng.integers(500_000, 2_000_000, size=rows)
              df = pd.DataFrame(
                  {
                      "date": pd.date_range("2024-01-01", periods=rows, freq="D"),
                      "Close": close,
                      "Volume": volume,
                  }
              )
              df.to_csv(data_dir / f"{ticker}_features.csv", index=False)
          PY

      - name: CLI smoke check
        run: python main.py --help

      - name: Run fast test suite
        run: pytest -q -m "not slow" --maxfail=1 --disable-warnings

      - name: Run feature branch regression slice
        run: |
          pytest -q \
            tests/test_forecast_output.py \
            tests/test_model_registry.py \
            tests/test_trainer_scheduling.py \
            tests/test_trainer_integration.py \
            tests/test_tune_hyperparams.py \
            --maxfail=1

      - name: Coverage report (best-effort)
        if: ${{ always() }}
        run: pytest -q -m "not slow" --cov=. --cov-report=xml:coverage.xml || true
