name: Regression Guards

on:
  push:
    branches: [main, master, develop, feature/optuna]
  pull_request:
    branches: [main, master, develop, feature/optuna]
  workflow_dispatch:

jobs:
  regression-guards:
    runs-on: ubuntu-latest
    name: Regression Guards (py${{ matrix.python-version }})
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: "**/requirements.txt"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create synthetic CI datasets
        run: |
          python - <<'PY'
          from pathlib import Path

          import numpy as np
          import pandas as pd

          data_dir = Path("data")
          data_dir.mkdir(exist_ok=True)
          specs = {"NVDA": 320, "MSFT": 320}

          for idx, (ticker, rows) in enumerate(specs.items()):
              rng = np.random.default_rng(42 + idx)
              close = 100.0 + np.cumsum(rng.normal(0.1, 1.0, rows))
              volume = rng.integers(500_000, 2_000_000, size=rows)
              df = pd.DataFrame(
                  {
                      "date": pd.date_range("2024-01-01", periods=rows, freq="D"),
                      "Close": close,
                      "Volume": volume,
                  }
              )
              df.to_csv(data_dir / f"{ticker}_features.csv", index=False)
          PY

      - name: Run architecture/leakage guards
        run: pytest -q tests/test_architecture_and_leakage.py --maxfail=1

      - name: Run preprocessing robustness guards
        run: pytest -q tests/test_preprocessing_pipeline.py --maxfail=1

      - name: Run flow and fine-tuning guards
        run: |
          pytest -q \
            tests/test_flows.py \
            tests/test_finetune.py \
            --maxfail=1

      - name: Run trainer and Optuna guards
        run: |
          pytest -q \
            tests/test_forecast_output.py \
            tests/test_trainer_scheduling.py \
            tests/test_trainer_integration.py \
            tests/test_tune_hyperparams.py \
            --maxfail=1
