name: Pylint

on:
  push:
    branches: [ main, master, develop ]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pylint

      - name: Run pylint
        env:
          PYTHONPATH: .
        run: |
          set -euo pipefail
          TARGETS=()
          for path in main.py config.py models training utils; do
            if [ -e "$path" ]; then
              TARGETS+=("$path")
            fi
          done
          if [ ${#TARGETS[@]} -eq 0 ]; then
            echo "No lint targets found."
            exit 0
          fi
          pylint --disable=all --enable=E,F "${TARGETS[@]}"
